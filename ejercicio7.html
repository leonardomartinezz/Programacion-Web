            <li>Piña (1 taza)</li>
            <ul>
                <li>Cortada en cubos</li>
            </ul>
        </li>

        </ul>
        <h2>Preparación:</h2>
        <ol>
            <li>Marinar la carne por 2 horas.</l1>
            <li>Asar a fuego medio.</li>
        </ol>
