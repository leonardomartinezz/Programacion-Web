<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 13 </title>
    <link rel="stylesheet" href="css/ejercicio11.css">
</head>
<body>

    <div class="contenedor-aprovación">
        <h1>Validador de edades</h1>
        <p class="subtitulo">Ejerce un libre voto</p>

        <div class="grupo-formulario">
            <label for="Edad">Edad:</label>
            <input type="number" id="edad" placeholder="Ej: 25" required min="1" max="100" aria-placeholder="Solo números">
            <div id="error" class="error-mensaje">Por favor, ingresa un número válido.</div>
        </div>

        <div class="grupo-formulario">
            <label for="validacion">Validez:</label>
            <input type="text" id="validacion" readonly placeholder="Validacion aquí...">
        </div>

        <button type="button" class="boton-convertir" id="btnConvertir">Convertir</button>
    </div>

    <script src="js/ejercicio13.js"></script>

</body>
</html>
