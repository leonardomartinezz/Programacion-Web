<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Ejercicios ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f6fa;
            color: #4a4a4a;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }
        .menu-container {
            background: white;
            padding: 35px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(146, 125, 193, 0.08);
            max-width: 440px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #927dc1;
            font-weight: 600;
        }
        .subtitle {
            font-size: 13px;
            color: #a0a0a0;
            margin-bottom: 30px;
        }
        .grid-ejercicios {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .grid-ejercicios a {
            display: block;
            padding: 12px;
            background-color: #f9f8fc;
            color: #7d7099;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s ease;
            border: 1px solid #f0edf7;
        }
        .grid-ejercicios a:hover {
            background-color: #eedffa;
            color: #6c52a3;
            border-color: #e2cbf5;
            transform: translateY(-2px);
        }
        .lista-principales {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .lista-principales a {
            display: block;
            padding: 14px;
            background-color: #f3f9fb;
            color: #49657b;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s ease;
            text-align: left;
            border: 1px solid #e5f2f5;
        }
        .lista-principales a:hover {
            background-color: #dcf0f5;
            color: #2b485c;
            border-color: #cbe6ed;
            transform: translateX(4px);
        }
        .emoji {
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>Mis Ejercicios ✨</h1>
        <p class="subtitle">Programación Web • Proyectos e Instrucciones</p>
        
        <!-- Bloque compacto para los primeros ejercicios básicos -->
        <div class="grid-ejercicios">
            <a href="ejercicio1.html">Ex 1</a>
            <a href="ejercicio2.html">Ex 2</a>
            <a href="ejercicio3.html">Ex 3</a>
            <a href="ejercicio4.html">Ex 4</a>
            <a href="ejercicio5.html">Ex 5</a>
            <a href="ejercicio6.html">Ex 6</a>
        </div>

        <!-- Lista bonita para los ejercicios principales -->
        <ul class="lista-principales">
            <li>
                <a href="ejercicio7.html">
                    <span class="emoji">🌮</span> Ejercicio 7: Receta al Pastor
                </a>
            </li>
            <li>
                <a href="ejercicio8.html">
                    <span class="emoji">📅</span> Ejercicio 8: Horario de Clases
                </a>
            </li>
            <li>
                <a href="ejercicio9.html">
                    <span class="emoji">✉️</span> Ejercicio 9: Formulario Web
                </a>
            </li>
            <li>
                <a href="ejercicio10.html">
                    <span class="emoji">🌡️</span> Ejercicio 10: Conversor JS
                </a>
            </li>
        </ul>
    </div>

</body>
</html>
