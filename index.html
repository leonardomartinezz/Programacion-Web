<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Ejercicios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }
        .menu-container {
            background: white;
            padding: 35px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            max-width: 420px;
            width: 100%;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 5px;
            color: #2c3e50;
            font-weight: 600;
            text-align: center;
        }
        .subtitle {
            font-size: 13px;
            color: #8e9bb0;
            margin-bottom: 25px;
            text-align: center;
        }
        .grid-ejercicios {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        .grid-ejercicios a {
            display: block;
            padding: 10px;
            background-color: #fcfcfc;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 13px;
            text-align: center;
            transition: all 0.2s ease;
            border: 1px solid #eee;
        }
        .grid-ejercicios a:hover {
            background-color: #f1f3f5;
            color: #000;
            border-color: #ddd;
        }
        .lista-principales {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .lista-principales a {
            display: block;
            padding: 12px 15px;
            background-color: #f8f9fa;
            color: #495057;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s ease;
            border: 1px solid #e9ecef;
        }
        .lista-principales a:hover {
            background-color: #e9ecef;
            color: #000;
            border-color: #dee2e6;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>Mis Ejercicios</h1>
        <p class="subtitle">Programación Web • Contenido e Instrucciones</p>
        
        <div class="grid-ejercicios">
            <a href="ejercicio1.html">Ex 1</a>
            <a href="ejercicio2.html">Ex 2</a>
            <a href="ejercicio3.html">Ex 3</a>
            <a href="ejercicio4.html">Ex 4</a>
            <a href="ejercicio5.html">Ex 5</a>
            <a href="ejercicio6.html">Ex 6</a>
        </div>

        <ul class="lista-principales">
            <li><a href="ejercicio7.html">Ejercicio 7: Receta al Pastor</a></li>
            <li><a href="ejercicio8.html">Ejercicio 8: Horario de Clases</a></li>
            <li><a href="ejercicio9.html">Ejercicio 9: Formulario Web</a></li>
            <li><a href="ejercicio10.html">Ejercicio 10: Conversor JS</a></li>
        </ul>
    </div>

</body>
</html>
