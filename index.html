<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios | Programación Web</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc;
            color: #1a1a1a;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }
        .menu-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #eef0f2;
            max-width: 440px;
            width: 100%;
        }
        h1 {
            font-size: 19px;
            margin-bottom: 4px;
            color: #111;
            font-weight: 600;
            text-align: center;
        }
        .subtitle {
            font-size: 12px;
            color: #888;
            margin-bottom: 25px;
            text-align: center;
        }
        .grid-ejercicios {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        .grid-ejercicios a {
            display: block;
            padding: 10px;
            background-color: #fafafa;
            color: #555;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 13px;
            text-align: center;
            transition: all 0.2s ease;
            border: 1px solid #eaeaea;
        }
        .grid-ejercicios a:hover {
            background-color: #f1f1f1;
            color: #000;
            border-color: #ccc;
        }
        .lista-principales {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .lista-principales a {
            display: block;
            padding: 12px 14px;
            background-color: #fafafa;
            color: #444;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 13.5px;
            transition: all 0.2s ease;
            border: 1px solid #eaeaea;
        }
        .lista-principales a:hover {
            background-color: #f1f1f1;
            color: #000;
            border-color: #ccc;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>Mis Ejercicios</h1>
        <p class="subtitle">Programación Web • Contenido e Instrucciones</p>
        
        <div class="grid-ejercicios">
            <a href="ejercicio1.html">Ex 1</a>
            <a href="ejercicio2.html">Ex 2</a>
            <a href="ejercicio3.html">Ex 3</a>
            <a href="ejercicio4.html">Ex 4</a>
            <a href="ejercicio5.html">Ex 5</a>
            <a href="ejercicio6.html">Ex 6</a>
        </div>

        <ul class="lista-principales">
            <li><a href="ejercicio7.html">Ejercicio 7: Receta al Pastor</a></li>
            <li><a href="ejercicio8.html">Ejercicio 8: Horario de Clases</a></li>
            <li><a href="ejercicio9.html">Ejercicio 9: Formulario Web</a></li>
            <li><a href="ejercicio10.html">Ejercicio 10: Conversor JS</a></li>
        </ul>
    </div>

</body>
</html>
