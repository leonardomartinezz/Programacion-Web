<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 11 </title>
    <link rel="stylesheet" href="css/ejercicio11.css">
</head>
<body>

    <div class="contenedor-conversor">
        <h1>Conversor de Kilómetros a millas</h1>
        <p class="subtitulo">Transforma Kilómetros a millas</p>

        <div class="grupo-formulario">
            <label for="Kilómetros">Kilómetros (km):</label>
            <input type="number" id="Kilómetros" placeholder="Ej: 25" required min=1>
            <div id="error" class="error-mensaje">Por favor, ingresa un número válido.</div>
        </div>

        <div class="grupo-formulario">
            <label for="millas">Resultado en millas (mi):</label>
            <input type="text" id="millas" readonly placeholder="Resultado aquí...">
        </div>

        <button type="button" class="boton-convertir" id="btnConvertir">Convertir</button>
    </div>

    <script src="js/ejercicio11.js"></script>

</body>
</html>
